name: Release

# Publishes to PyPI when a version tag is pushed (e.g. `git tag v0.2.0 && git push --tags`).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
#
# One-time setup on PyPI (Project → Publishing → Add a new pending/trusted publisher):
#   Owner: SearchSteward · Repository: searchsteward-mcp
#   Workflow: release.yml · Environment: pypi
# The version tag must match the version in pyproject.toml.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Pinned to a commit SHA (supply-chain hardening) — this is v1.14.1.
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
